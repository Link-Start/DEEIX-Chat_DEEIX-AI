name: Workspace Quality

on:
  push:
    branches:
      - main
      - dev
    paths:
      - "backend/**"
      - "frontend/**"
      - "packages/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "turbo.json"
      - "scripts/sync-version.mjs"
      - "VERSION"
      - ".github/workflows/frontend-quality.yml"
  pull_request:
    branches:
      - main
      - dev
    paths:
      - "backend/**"
      - "frontend/**"
      - "packages/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "turbo.json"
      - "scripts/sync-version.mjs"
      - "VERSION"
      - ".github/workflows/frontend-quality.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    name: Frontend and backend checks
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.17.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run workspace checks
        run: pnpm check

      - name: Run workspace tests
        run: pnpm test
